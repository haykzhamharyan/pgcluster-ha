- name: Install dependencies
  package:
    name: unzip,curl
    state: present
  become: yes

- name: Download Consul
  get_url:
    url: "https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_linux_amd64.zip"
    dest: /tmp/consul.zip
    mode: '0644'

- name: Unzip Consul
  unarchive:
    src: /tmp/consul.zip
    dest: /usr/local/bin/
    remote_src: yes
  become: yes

- name: Create Consul user
  user:
    name: consul
    shell: /bin/false
    system: yes
  become: yes

- name: Create Consul directories
  file:
    path: "{{ item }}"
    state: directory
    owner: consul
    group: consul
    mode: '0755'
  loop:
    - /etc/consul.d
    - /var/lib/consul
  become: yes

- name: Ensure Consul data directory exists
  file:
    path: /opt/consul
    state: directory
    owner: consul
    group: consul
    mode: '0750'

- name: Deploy Consul configuration
  template:
    src: consul.hcl.j2
    dest: /etc/consul.d/consul.hcl
    owner: consul
    group: consul
    mode: '0644'
  become: yes

- name: Create systemd service for Consul
  copy:
    dest: /etc/systemd/system/consul.service
    content: |
      [Unit]
      Description=Consul Agent
      Requires=network-online.target
      After=network-online.target

      [Service]
      User=consul
      Group=consul
      ExecStart=/usr/local/bin/consul agent -config-dir=/etc/consul.d
      Restart=on-failure
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target
  become: yes

- name: Reload systemd
  command: systemctl daemon-reload
  become: yes

- name: Enable and start Consul
  systemd:
    name: consul
    enabled: yes
    state: started
  become: yes